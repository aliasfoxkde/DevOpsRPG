name: Autonomous Agent Workflow

on:
  schedule:
    # Run daily at 9 AM UTC - off-peak hours
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allow manual trigger
  issues:
    types: [opened, labeled]

concurrency:
  group: autonomous-workflow
  cancel-in-progress: false

jobs:
  # Phase 1: Triage and prioritize new issues
  triage:
    name: Triage Issues
    runs-on: ubuntu-latest
    outputs:
      issues_to_process: ${{ steps.filter.outputs.issues }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get open issues needing triage
        id: filter
        run: |
          # Fetch issues with needs-triage label that are not already being worked on
          ISSUES=$(gh issue list \
            --label "needs-triage" \
            --state open \
            --json number,title,labels,createdAt \
            --jq '[.[] | {number: .number, title: .title, labels: [.labels[].name], createdAt: .createdAt}]')
          echo "issues=$ISSUES" >> $GITHUB_OUTPUT

      - name: Display issues to triage
        run: |
          echo "Found $(echo '${{ steps.filter.outputs.issues }}' | jq length) issues needing triage"
          echo '${{ steps.filter.outputs.issues }}' | jq -r '.[] | "  #\(.number): \(.title)"'

  # Phase 2: Analyze and categorize issues
  analyze:
    name: Analyze Issues
    needs: triage
    runs-on: ubuntu-latest
    if: needs.triage.outputs.issues_to_process != '[]'
    outputs:
      analyzed_issues: ${{ steps.analyze.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Analyze issues with AI
        id: analyze
        run: |
          # This is a simplified analysis - in production you'd call an AI API
          # For now, we'll categorize by labels and priority
          ISSUES='${{ needs.triage.outputs.issues_to_process }}'

          # Create analysis output with categorization
          ANALYZED=$(echo "$ISSUES" | jq '
            map({
              number: .number,
              title: .title,
              labels: .labels,
              priority: if (.labels | contains(["priority-high"])) then "high"
                        elif (.labels | contains(["priority-medium"])) then "medium"
                        else "low" end,
              category: if (.labels | contains(["bug"])) then "bug"
                        elif (.labels | contains(["enhancement"])) then "feature"
                        elif (.labels | contains(["change-request"])) then "change"
                        else "other" end,
              complexity: "medium",
              estimated_time: "2h"
            })
          ')
          echo "result=$ANALYZED" >> $GITHUB_OUTPUT

      - name: Store analysis results
        run: |
          echo "Analysis complete for $(echo '${{ steps.analyze.outputs.analyzed_issues }}' | jq length) issues"

  # Phase 3: Implement changes for high-priority items
  implement:
    name: Implement Changes
    needs: analyze
    runs-on: ubuntu-latest
    if: needs.analyze.outputs.analyzed_issues != '[]'
    strategy:
      matrix:
        issue: ${{ fromJson(needs.analyze.outputs.analyzed_issues) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Analyze issue and create branch
        run: |
          ISSUE_NUMBER=${{ matrix.issue.number }}
          BRANCH_NAME="auto/issue-${ISSUE_NUMBER}-$(date +%Y%m%d%H%M%S)"
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

          # Create branch from main
          git checkout -b $BRANCH_NAME

      - name: Validate current state
        run: |
          npm run lint
          npm run typecheck
          npm run test -- --run

      - name: Generate implementation plan
        run: |
          # Create a task file for this issue
          mkdir -p .github/autonomous/tasks
          cat > .github/autonomous/tasks/${{ matrix.issue.number }}.json << EOF
          {
            "issue_number": ${{ matrix.issue.number }},
            "title": "${{ matrix.issue.title }}",
            "priority": "${{ matrix.issue.priority }}",
            "category": "${{ matrix.issue.category }}",
            "status": "in_progress",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Commit task file
        run: |
          git add .github/autonomous/tasks/${{ matrix.issue.number }}.json
          git commit -m "chore: start work on issue #${{ matrix.issue.number }}

          Co-Authored-By: Claude <noreply@anthropic.com>"

      - name: Push branch
        run: |
          git push -u origin ${{ env.branch }}
          gh issue comment ${{ matrix.issue.number }} --body "I'm analyzing this issue and working on a fix. This PR will address it shortly."

      - name: Create draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --draft \
            --title "Fix: Issue #${{ matrix.issue.number }} - ${{ matrix.issue.title }}" \
            --body "## Summary
          Automated PR for Issue #${{ matrix.issue.number }}

          **Priority**: ${{ matrix.issue.priority }}
          **Category**: ${{ matrix.issue.category }}

          This PR implements the solution for the reported issue.

          ## Implementation Notes
          - TODO: Add specific implementation details

          Co-Authored-By: Claude <noreply@anthropic.com>" \
            --base main

  # Phase 4: Quality checks on all PRs
  quality-check:
    name: Quality Check
    needs: implement
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run full validation
        run: |
          npm run lint
          npm run typecheck
          npm run test -- --run
          npm run build

  # Phase 5: Generate daily report
  report:
    name: Generate Report
    needs: [triage, analyze, implement]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate daily report
        run: |
          cat > .github/autonomous/reports/$(date +%Y-%m-%d).md << EOF
          # Autonomous Workflow Report - $(date +%Y-%m-%d)

          ## Summary
          - Issues triaged: ${{ needs.triage.outputs.issues_to_process == '[]' && '0' || '1' }}
          - Issues analyzed: ${{ needs.analyze.outputs.analyzed_issues == '[]' && '0' || fromJson(needs.analyze.outputs.analyzed_issues) | length }}
          - PRs created: ${{ needs.implement.outputs.issues || '0' }}

          ## Processed Issues
          ${{ needs.analyze.outputs.analyzed_issues }}

          ## Next Steps
          - Review draft PRs
          - Complete implementation for remaining issues
          - Merge qualified changes

          _Generated by Autonomous Agent Workflow_
          EOF

      - name: Create report directory
        run: mkdir -p .github/autonomous/reports

      - name: Save report
        run: |
          mkdir -p .github/autonomous/reports
          cat > .github/autonomous/reports/$(date +%Y-%m-%d).md << 'REPORT'
          # Autonomous Workflow Report - DATE_PLACEHOLDER

          ## Summary
          - Issues triaged: TBD
          - Issues analyzed: TBD
          - PRs created: TBD

          _Generated by Autonomous Agent Workflow_
          REPORT

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-$(date +%Y-%m-%d)
          path: .github/autonomous/reports/$(date +%Y-%m-%d).md
          retention-days: 30

      - name: Post to issue (if issues were processed)
        if: needs.triage.outputs.issues_to_process != '[]'
        run: |
          echo "Daily autonomous workflow completed. Processed issues from triage queue."